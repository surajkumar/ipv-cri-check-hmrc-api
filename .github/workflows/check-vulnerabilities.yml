name: Check vulnerabilities

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

# Helper scripts live in .github/scripts/ - see them for the actual logic.
# This workflow just orchestrates: audit → parse → (PRs | issue).

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit
        run: |
          npm ci
          npm audit --json > audit.json || true
          npm audit || true

      - name: Bucket vulnerabilities
        id: parse
        run: node .github/scripts/parse-audit.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: |
            audit.json
            audit-summary.json

      - name: Configure git for bot commits
        if: >
          steps.parse.outputs.safe_count != '0' ||
          steps.parse.outputs.force_count != '0' ||
          steps.parse.outputs.breaking_count != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: PR - in-range fixes
        if: steps.parse.outputs.safe_count != '0'
        run: .github/scripts/open-fix-pr.sh safe

      - name: PR - non-breaking out-of-range upgrades
        if: steps.parse.outputs.force_count != '0'
        run: .github/scripts/open-fix-pr.sh forceNonBreaking

      - name: PR - breaking (SemVer-major) upgrades
        if: steps.parse.outputs.breaking_count != '0'
        run: .github/scripts/open-fix-pr.sh breaking

      - name: Sync unfixable-vulns issue
        if: always() && steps.parse.outcome == 'success'
        run: .github/scripts/sync-unfixable-issue.sh
